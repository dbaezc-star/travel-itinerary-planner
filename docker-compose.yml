version: '3.8'

services:
  airport-service:
    build: ./airport-service
    ports:
      - "8001:8001"
    networks:
      - travel-network

  itinerary-service:
    build: ./itinerary-service
    ports:
      - "8002:8002"
    environment:
      - AIRPORT_SERVICE_URL=http://airport-service:8001
      - DATABASE_URL=sqlite:///./itineraries.db
    depends_on:
      - airport-service
    networks:
      - travel-network

  frontend:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
    networks:
      - travel-network

networks:
  travel-network:
    driver: bridge
