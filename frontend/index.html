<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Itinerary Planner</title>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #1a1a2e; color: #eee; }
        header { background: #16213e; padding: 20px; text-align: center; }
        header h1 { color: #e94560; font-size: 2rem; }
        .container { max-width: 1200px; margin: 20px auto; padding: 0 20px; }
        .card { background: #16213e; border-radius: 10px; padding: 20px; margin-bottom: 20px; }
        .card h2 { color: #e94560; margin-bottom: 15px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        input { width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #e94560; background: #0f3460; color: #eee; }
        button { padding: 10px 25px; background: #e94560; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 1rem; }
        button:hover { background: #c73652; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #0f3460; }
        th { color: #e94560; }
        #map { width: 100%; height: 500px; }
        .btn-delete { background: #c0392b; padding: 5px 10px; font-size: 0.8rem; }
    </style>
</head>
<body>
<header><h1>Travel Itinerary Planner</h1></header>
<div class="container">
    <div class="card">
        <h2>Mapa de Aeropuertos</h2>
        <div id="map"></div>
    </div>
    <div class="card">
        <h2>Crear Itinerario</h2>
        <div class="form-grid">
            <input id="user_name" placeholder="Nombre del viajero" />
            <input id="travel_date" type="date" />
            <input id="departure_id" type="number" placeholder="ID Aeropuerto Salida" />
            <input id="arrival_id" type="number" placeholder="ID Aeropuerto Llegada" />
            <input id="duration" type="number" placeholder="Duracion en minutos" />
            <button id="btn-crear">Crear Itinerario</button>
        </div>
    </div>
    <div class="card">
        <h2>Mis Itinerarios</h2>
        <table>
            <thead><tr><th>ID</th><th>Viajero</th><th>Salida</th><th>Llegada</th><th>Fecha</th><th>Duracion</th><th>Accion</th></tr></thead>
            <tbody id="itineraries-table"></tbody>
        </table>
    </div>
</div>
<script>
var AIRPORT_API = 'http://localhost:8001';
var ITINERARY_API = 'http://localhost:8002';

function loadMap() {
    fetch(AIRPORT_API + '/airports/map-data')
        .then(function(r){ return r.json(); })
        .then(function(data){
            Plotly.newPlot('map', [data], {
                geo: { scope: 'south america', showland: true, landcolor: '#0f3460', showocean: true, oceancolor: '#1a1a2e', countrycolor: '#e94560' },
                paper_bgcolor: '#16213e', plot_bgcolor: '#16213e',
                font: { color: '#eee' },
                margin: { t: 0, b: 0, l: 0, r: 0 }
            });
        })
        .catch(function(e){ console.error('Error cargando mapa', e); });
}

function loadItineraries() {
    fetch(ITINERARY_API + '/itineraries/')
        .then(function(r){ return r.json(); })
        .then(function(data){
            var tbody = document.getElementById('itineraries-table');
            tbody.innerHTML = data.map(function(i){
                return '<tr><td>' + i.id + '</td><td>' + i.user_name + '</td><td>' + i.departure_airport_id + '</td><td>' + i.arrival_airport_id + '</td><td>' + i.travel_date + '</td><td>' + i.duration_minutes + ' min</td><td><button class="btn-delete" onclick="deleteItinerary(' + i.id + ')">Eliminar</button></td></tr>';
            }).join('');
        })
        .catch(function(e){ console.error('Error cargando itinerarios', e); });
}

function createItinerary() {
    var body = {
        user_name: document.getElementById('user_name').value,
        travel_date: document.getElementById('travel_date').value,
        departure_airport_id: parseInt(document.getElementById('departure_id').value),
        arrival_airport_id: parseInt(document.getElementById('arrival_id').value),
        duration_minutes: parseInt(document.getElementById('duration').value)
    };
    fetch(ITINERARY_API + '/itineraries/', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(body)
    })
    .then(function(r){
        if(r.ok){ alert('Itinerario creado!'); loadItineraries(); }
        else { r.json().then(function(e){ alert('Error: ' + JSON.stringify(e.detail)); }); }
    })
    .catch(function(e){ alert('Error de conexion: ' + e); });
}

function deleteItinerary(id) {
    fetch(ITINERARY_API + '/itineraries/' + id, { method: 'DELETE' })
        .then(function(){ loadItineraries(); });
}

document.getElementById('btn-crear').addEventListener('click', createItinerary);

loadMap();
loadItineraries();
</script>
</body>
</html>
